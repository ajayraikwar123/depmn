<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login - DEP MN</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative; /* ✅ only added for back button */
  }

  /* ✅ Back to Login button (Top Left) */
  .back-btn {
    position: absolute;
    top: 18px;
    left: 18px;
    padding: 10px 14px;
    background: #e74c3c;   /* ✅ red */
    color: #fff;           /* ✅ white text */
    font-weight: bold;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
    text-decoration: none;
    transition: 0.3s;
    border: none;
  }

  .back-btn:hover {
    background: #c0392b;   /* ✅ dark red hover */
  }

  .login-container {
    background-color: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    width: 100%;
    max-width: 400px;
    margin-bottom: 40px;
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #2c3e50;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: 500;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 15px;
  }

  input:focus {
    outline: none;
    border-color: #3498db;
    box-shadow: 0 0 8px rgba(52, 152, 219, 0.6);
  }

  button {
    width: 100%;
    padding: 12px;
    background-color: #e74c3c;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background-color: #c0392b;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid white;
    border-top: 2px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-left: 10px;
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .footer-text {
    font-size: 14px;
    color: #ffffffcc;
    text-align: center;
    user-select: none;
    letter-spacing: 1.1px;
    padding: 10px 20px;
    border-radius: 30px;
    background: rgba(52, 152, 219, 0.3);
    box-shadow: 0 0 15px rgba(52, 152, 219, 0.6);
    max-width: 350px;
  }
</style>

<!-- Firebase -->
<script type="module">
import { app } from "./firebase-config.js";
import { 
  getAuth, 
  signInWithEmailAndPassword,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth(app);
await setPersistence(auth, browserLocalPersistence);

window.adminLogin = function(e){
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const spinner = document.getElementById("spinner");
  const btn = document.getElementById("loginBtn");

  spinner.style.display = "inline-block";
  btn.disabled = true;

  signInWithEmailAndPassword(auth, email, password)
  .then((userCredential) => {

      spinner.style.display = "none";
      btn.disabled = false;

      if(userCredential.user.email === "ajay.raikwar0786@gmail.com"){
          window.location.href = "admin.html";
      } else {
          alert("You are not authorized as Admin");
      }

  })
  .catch(() => {
      spinner.style.display = "none";
      btn.disabled = false;
      alert("Invalid Admin Credentials");
  });
}
</script>

</head>

<body>

<!-- ✅ Back to Login Button -->
<a class="back-btn" href="index.html">← Back to Login</a>

<div class="login-container">
  <h2>Admin Login - DEP MN</h2>
  <form onsubmit="adminLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="Enter Admin Email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Enter Password">
    </div>
    <button type="submit" id="loginBtn">
      Login
      <div class="spinner" id="spinner"></div>
    </button>
  </form>
</div>

<div class="footer-text">
  This Project is developed by Mr. Ajay Raikwar
</div>

</body>
</html>
